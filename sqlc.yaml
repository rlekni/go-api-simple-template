version: "2"
sql:
  - schema: "postgresql/migrations"
    queries: "postgresql/queries"
    engine: "postgresql"
    gen:
      go:
        out: internal/postgresql
        package: "db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
